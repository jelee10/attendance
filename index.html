<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>TCAD 단기특강 출석</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 70px 20px 30px;
      background: #f5f7fa;
      font-family: Arial, "Noto Sans KR", sans-serif;
    }

    .card {
      width: 100%;
      max-width: 340px;
      padding: 32px 24px;
      text-align: center;
      background: white;
      border-radius: 18px;
      box-shadow: 0 6px 22px rgba(0, 0, 0, 0.1);
    }

    h1 {
      margin: 0 0 18px;
      font-size: 23px;
      line-height: 1.4;
    }

    p {
      margin: 0 0 28px;
      color: #555;
      font-size: 16px;
      line-height: 1.6;
    }

    button {
      width: 200px;
      min-height: 54px;
      border: 0;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-size: 19px;
      font-weight: 700;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>TCAD 단기특강(이론) 출석</h1>

    <p>
      출석을 시작하려면<br>
      아래 버튼을 눌러주세요.
    </p>

    <button type="button" onclick="openAttendance()">
      출석하기
    </button>
  </main>

  <script>
    function openAttendance() {
      window.location.href =
        "https://script.google.com/macros/s/AKfycbz5xieqatT3H6iaXvv_UXtZHu05iCHS-oOVfxyF3fTj6kLDoJYhrhw3vPQUQml_RxM3yw/exec";
    }
  </script>
</body>
</html>
